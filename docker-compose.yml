# commercial-kpi-dashboard/docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kpi-db
    restart: unless-stopped
    ports:
      - "5433:5432"  # Puerto host:5433, Puerto contenedor:5432
    environment:
      POSTGRES_USER: ${DB_USER:-kpi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kpi_password}
      POSTGRES_DB: ${DB_NAME:-kpi_dashboard}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data  # Para acceder a los CSVs desde el contenedor
    networks:
      - kpi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi_user -d kpi_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: kpi-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432  # Puerto interno del contenedor (siempre es 5432)
      DB_USER: ${DB_USER:-kpi_user}
      DB_PASSWORD: ${DB_PASSWORD:-kpi_password}
      DB_NAME: ${DB_NAME:-kpi_dashboard}
      DATABASE_URL: postgresql://${DB_USER:-kpi_user}:${DB_PASSWORD:-kpi_password}@postgres:5432/${DB_NAME:-kpi_dashboard}?schema=public
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kpi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: kpi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - kpi-network

volumes:
  postgres_data:
    name: kpi-postgres-data

networks:
  kpi-network:
    name: kpi-network
    driver: bridge