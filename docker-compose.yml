version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kpi-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-kpi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kpi_password}
      POSTGRES_DB: ${DB_NAME:-kpi_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data
    networks:
      - kpi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kpi_user} -d ${DB_NAME:-kpi_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: kpi-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-kpi_user}:${DB_PASSWORD:-kpi_password}@postgres:5432/${DB_NAME:-kpi_dashboard}?schema=gold
    volumes:
      - ./backend/src:/app/src
      - ./backend/server.ts:/app/server.ts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kpi-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: kpi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend
    networks:
      - kpi-network

volumes:
  postgres_data:
    name: kpi-postgres-data

networks:
  kpi-network:
    name: kpi-network
    driver: bridge